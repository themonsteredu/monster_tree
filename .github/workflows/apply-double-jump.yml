name: Apply double jump patch

on:
  push:
    branches: [agent/double-jump]
    paths:
      - .github/workflows/apply-double-jump.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/double-jump
      - name: Add double jump logic
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/app/me/game-center/math-adventure/MathAdventureGame.tsx")
          text = path.read_text()

          replacements = [
              (
                  '  const controlsRef = useRef<Controls>({ ...EMPTY_CONTROLS });\n  const cameraRef = useRef(0);',
                  '  const controlsRef = useRef<Controls>({ ...EMPTY_CONTROLS });\n  const jumpCountRef = useRef(0);\n  const cameraRef = useRef(0);',
              ),
              (
                  '    cameraRef.current = 0;\n    controlsRef.current = { ...EMPTY_CONTROLS };\n    setQuizFeedback(null);',
                  '    cameraRef.current = 0;\n    controlsRef.current = { ...EMPTY_CONTROLS };\n    jumpCountRef.current = 0;\n    setQuizFeedback(null);',
              ),
              (
                  '      cameraRef.current = 0;\n      itemsRef.current = [];\n      projectilesRef.current = [];',
                  '      cameraRef.current = 0;\n      jumpCountRef.current = 0;\n      itemsRef.current = [];\n      projectilesRef.current = [];',
              ),
              (
                  '      if (controls.jumpQueued) {\n        controls.jumpQueued = false;\n        if (player.onGround) {\n          player.vy = -JUMP_SPEED;\n          player.onGround = false;\n        }\n      }',
                  '      if (controls.jumpQueued) {\n        controls.jumpQueued = false;\n        if (player.onGround) {\n          player.vy = -JUMP_SPEED;\n          player.onGround = false;\n          jumpCountRef.current = 1;\n        } else if (jumpCountRef.current < 2) {\n          player.vy = -JUMP_SPEED * 0.92;\n          jumpCountRef.current = 2;\n        }\n      }',
              ),
              (
                  '          player.vy = 0;\n          player.onGround = true;\n        } else if (player.vy < 0',
                  '          player.vy = 0;\n          player.onGround = true;\n          jumpCountRef.current = 0;\n        } else if (player.vy < 0',
              ),
              (
                  '                  주황 아이템 큐브를 아래에서 점프해 치면 아이템이 등장해요.',
                  '                  주황 아이템 큐브를 아래에서 점프해 치면 아이템이 등장해요.<br />공중에서 점프를 한 번 더 누르면 더블점프!',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match, found {count}: {old[:80]!r}")
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY
      - name: Commit double jump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/me/game-center/math-adventure/MathAdventureGame.tsx
          git commit -m "feat(game-center): 더블점프 추가"
          git push origin HEAD:agent/double-jump
