name: Debug Math Adventure

on:
  pull_request:
    branches: [main]

jobs:
  lint-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - id: lint
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: math-adventure-lint-log
          path: lint.log
          if-no-files-found: error
      - if: steps.lint.outputs.exit_code != '0'
        run: exit 1
